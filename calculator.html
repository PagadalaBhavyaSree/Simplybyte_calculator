<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #57ff41, #ff1ead);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.calculator {
    width: fit-content;
    background: #1e293b;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 1px solid rgba(71, 255, 255, 0.9);
}

#result {
    width: 100%;
    height: 70px;
    font-size: 2rem;
    text-align: right;
    padding: 0 15px;
    margin-bottom: 15px;
    border: none;
    border-radius: 12px;
    background: #ff0bda;
    color: white;
    box-sizing: border-box;
    outline: none;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 70px);
    gap: 12px;
}

.buttons button {
    height: 65px;
    font-size: 1.3rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: #0d6cf0;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.buttons button:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.buttons button:active {
    transform: scale(0.95);
}

.operator {
    background: linear-gradient(135deg, #ff9800, #ff5722) !important;
}

.equal {
    background: linear-gradient(135deg, #00c853, #009624) !important;
}

.clear {
    background: linear-gradient(135deg, #ff1744, #d50000) !important;
}

.backspace {
    background: linear-gradient(135deg, #9c27b0, #673ab7) !important;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="result" disabled>

    <div class="buttons">
        <button onclick="clearResult()" class="clear">C</button>
        <button onclick="backspace()" class="backspace">⌫</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('.')">.</button>

        <button onclick="appendValue('0')">0</button>
        <button class="equal" onclick="calculate()" style="grid-column: span 3;">=</button>
    </div>
</div>

<script>
const result = document.getElementById("result");

function appendValue(val) {
    const operators = ['+', '-', '*', '/'];
    const lastChar = result.value.slice(-1);

    if (operators.includes(val) && operators.includes(lastChar)) {
        return;
    }

    result.value += val;
}

function calculate() {
    try {
        let answer = eval(result.value);

        if (!isFinite(answer)) {
            result.value = "Error";
        } else {
            result.value = answer;
        }
    } catch {
        result.value = "Error";
    }
}

function clearResult() {
    result.value = "";
}

function backspace() {
    result.value = result.value.slice(0, -1);
}
</script>

</body>
</html>
